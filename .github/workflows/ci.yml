name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout contracts (shared dependencies)
        run: git clone --depth 1 https://github.com/archlens-platform/archlens-contracts.git ../archlens-contracts

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ArchLens.Upload.sln

      - name: Build
        run: dotnet build ArchLens.Upload.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ArchLens.Upload.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./coverage --filter "FullyQualifiedName!~BDD"

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/**/coverage.opencover.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check SONAR_TOKEN
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.check-token.outputs.skip != 'true'

      - name: Checkout contracts (shared dependencies)
        if: steps.check-token.outputs.skip != 'true'
        run: git clone --depth 1 https://github.com/archlens-platform/archlens-contracts.git ../archlens-contracts

      - name: Setup .NET
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java 17
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarScanner Begin
        if: steps.check-token.outputs.skip != 'true'
        run: >
          dotnet sonarscanner begin
          /k:"archlens-platform_archlens-upload-service"
          /o:"archlens-platform"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"
          /d:sonar.exclusions="**/appsettings.*.json,**/Migrations/**,**/.github/**,**/Dockerfile"
          /d:sonar.coverage.exclusions="**/Program.cs,**/*Extensions.cs,**/Configurations/**,**/Middlewares/**,**/ExceptionHandlers/**,**/BackgroundServices/**,**/DependencyInjection.cs,**/Storage/**"

      - name: Build
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet build ArchLens.Upload.sln --configuration Release

      - name: Test
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet test ArchLens.Upload.sln --configuration Release --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./coverage --filter "FullyQualifiedName!~BDD"
        continue-on-error: true

      - name: SonarScanner End
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
